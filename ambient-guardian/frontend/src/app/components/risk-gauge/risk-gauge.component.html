<article class="panel gauge-panel" [ngClass]="'severity-' + status.toLowerCase()">
  <div class="panel__header">
    <div>
      <p class="eyebrow">Risk Score</p>
      <h2>{{ riskScore }}%</h2>
    </div>
    <span class="chip">{{ status }}</span>
  </div>

  <div #chartHost class="chart-host"></div>

  <div class="scale">
    <span>Safe</span>
    <span>Warning</span>
    <span>Critical</span>
  </div>
</article>
