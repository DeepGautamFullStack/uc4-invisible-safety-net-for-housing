<article class="panel scenario-panel">
  <div class="panel__header">
    <div>
      <p class="eyebrow">Demo Scenario Controls</p>
      <h2>Simulation Console</h2>
    </div>
  </div>

  <div class="control-grid">
    <button
      *ngFor="let control of controls"
      type="button"
      [ngClass]="'tone-' + control.tone"
      (click)="runScenario.emit(control.scenario)"
    >
      <span></span>
      {{ control.label }}
    </button>
  </div>
</article>
